name: Deploy Spring Boot to ECS

on: 
   push:
     branches:
        - main
jobs:
   build-and-deploy:
     runs-on: ubuntu-latest
steps:
- name: Checkout Code
- uses: actions/checkout@v3
- name: Configure AWS Credentials
  uses : aws-actions/configure-aws-credentials@v2
  with:
     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}concurrency: 
     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
     aws-region: eu-west-2
- name: Login to Amazon ECR
  id: login-ecr
  uses: aws-action/amazon-ecr-login@v1
- name: Build Docker Image
  run:
    docker build -t springboot-app .
- name: Tag Docker Image
  run: 
    docker tag springboot-app:lates \
    ${{ steps.login-ecr.outputs.registry }}/springboot-app:latest
-  name: Push Image to ECR
   run: 
     docker push ${{ steps.login-ecr.outputs.registry }}/springboot-app:latest
     
     
